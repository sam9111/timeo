name: My GitHub Action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  my-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: My action
        run: |
          echo "Repository URL: ${{ github.event.repository.clone_url }}"
          echo "Event type: ${{ github.event_name }}"
